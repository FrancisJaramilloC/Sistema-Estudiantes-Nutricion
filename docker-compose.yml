

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto_nutricion
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
    networks:
      - red_nutricional
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "health_test", "-m", "ok", "-u", "health", "-P", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb_nutricion
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    networks:
      - red_nutricional

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_nutricion
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MQTT_HOST=${MQTT_HOST:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_EXTERNAL_HOST=${MQTT_EXTERNAL_HOST:-192.168.110.145}
      - DYNAMODB_ENDPOINT_URL=${DYNAMODB_ENDPOINT_URL:-http://dynamodb:8000}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
      - JWT_SECRET=${JWT_SECRET:-nutria-secret-key-12345}
    volumes:
      - ./mosquitto/data:/mosquitto_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      dynamodb:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - red_nutricional

  alloy:
    image: grafana/alloy:latest
    container_name: alloy_nutricion
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_PROMETHEUS_API_KEY=${GRAFANA_CLOUD_PROMETHEUS_API_KEY}
      - GRAFANA_CLOUD_LOKI_URL=${GRAFANA_CLOUD_LOKI_URL}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
    depends_on:
      - api
    networks:
      - red_nutricional

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_nutricion
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - red_nutricional

networks:
  red_nutricional:
    driver: bridge
