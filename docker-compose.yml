version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_nutricion
    ports:
      - "5672:5672"    # RabbitMQ amqp port
      - "15672:15672"  # RabbitMQ management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - red_nutricional

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: api_nutricion
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - red_nutricional

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: worker_nutricion
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - red_nutricional

networks:
  red_nutricional:
    driver: bridge
